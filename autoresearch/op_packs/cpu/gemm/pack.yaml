op_id: cpu_gemm
metric:
  alpha_throughput: 0.6
task_limits:
  max_iterations: 20
  patience_no_improve: 6
gates:
  tiny_shape:
    m: 32
    n: 32
    k: 32
  checksum_atol: 1.0e-3
  checksum_rtol: 1.0e-3
  stability_repeat: 1
shapes:
  - name: s1_128
    m: 128
    n: 128
    k: 128
  - name: s2_256x128x256
    m: 256
    n: 128
    k: 256
  - name: s3_512
    m: 512
    n: 512
    k: 512
  - name: s4_1024
    m: 1024
    n: 1024
    k: 1024
candidate_space:
  kernel_variants: [naive, blocked, blocked_pack, blocked_pack_simd]
  block_m: [16, 32, 64, 96, 128]
  block_n: [16, 32, 64, 96, 128]
  block_k: [16, 32, 64, 96, 128]
  unroll_k: [1, 2, 4]
  thread_choices: [1, 2, 4, 8, 16]
  max_candidates: 96

